substitutions:
  devicename: pradelna-dopravnik-v2-test
  upper_devicename: "Prádelna dopravník V2 test"

esphome:
  name: ${devicename}
  friendly_name: ${upper_devicename}
  on_boot:
    priority: -10
    then:
      - lambda: |-
          id(klapka_servo).set_ramp_factor(id(klapka_rampa).state);
          id(klapka_servo).set_position_speed((int) id(klapka_manual_speed).state);

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:
  encryption:
    key: !secret api_password

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "Pradelna-Dopravnik-V2"
    password: !secret wifi_fallback_password

captive_portal:

web_server:
  port: 80
  local: true

external_components:
  - source: github://jindacek/st3215_esphome_klapka@main
    components: [st3215_servo_klapka]
    refresh: 0s

uart:
  id: bus_uart
  tx_pin: 17
  rx_pin: 16
  baud_rate: 1000000
  stop_bits: 1
  data_bits: 8
  parity: NONE

st3215_servo_klapka:
  - id: klapka_servo
    uart_id: bus_uart
    servo_id: 1
    invert_direction: false

    max_angle: 90.0
    position_speed: 700
    min_calib_span_turns: 0.02

    max_run_time_ms: 15000
    stall_timeout_ms: 1500
    stall_grace_ms: 900
    stall_min_delta_turns: 0.006

    angle:
      name: "Klapka raw úhel"
      id: klapka_raw_uhel
      disabled_by_default: true

    turns:
      name: "Klapka otáčky od nuly"
      id: klapka_otacky
      accuracy_decimals: 3

    percent:
      name: "Klapka poloha"
      id: klapka_percent

    torque_switch:
      name: "Klapka torque"
      id: klapka_torque

    auto_unlock_switch:
      name: "Klapka automatické odblokování"
      id: klapka_auto_unlock

    torque_state:
      name: "Klapka zámek"
      id: klapka_torque_state

    calib_state:
      name: "Klapka stav kalibrace kód"
      id: klapka_calib_state
      disabled_by_default: true

    state_sensor:
      name: "Klapka stav"
      id: klapka_stav

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    disabled_by_default: true

binary_sensor:
  - platform: template
    name: "Dummy Binary Sensor"
    internal: true

text_sensor:
  - platform: template
    name: "Klapka stav kalibrace"
    update_interval: 1s
    lambda: |-
      int s = (int) id(klapka_calib_state).state;
      if (s == 0) return {"Nutná kalibrace BOX1 / 0°"};
      if (s == 1) return {"Nepoužito"};
      if (s == 2) return {"Nepoužito"};
      if (s == 3) return {"Kalibrace BOX1 dokončena – připraveno"};
      if (s == 4) return {"Chyba kalibrace"};
      return {"Neznámý stav"};

number:
  - platform: template
    name: "Klapka rampová křivka"
    id: klapka_rampa
    optimistic: true
    restore_value: true
    initial_value: 1.4
    min_value: 0.6
    max_value: 2.5
    step: 0.05
    set_action:
      lambda: |-
        id(klapka_servo).set_ramp_factor(x);

  - platform: template
    name: "Klapka rychlost"
    id: klapka_manual_speed
    min_value: 100
    max_value: 3000
    step: 100
    initial_value: 700
    optimistic: true
    restore_value: true
    unit_of_measurement: "steps/s"
    set_action:
      lambda: |-
        id(klapka_servo).set_position_speed((int) x);

  - platform: template
    name: "Klapka úhel BOX2"
    id: klapka_uhel_box2
    min_value: 0
    max_value: 90
    step: 1
    initial_value: 62
    optimistic: true
    restore_value: true
    unit_of_measurement: "°"

switch:
  - platform: template
    id: dummy_switch_workaround
    internal: true
    turn_on_action: []
    turn_off_action: []

  - platform: restart
    name: "Restart"

button:
  - platform: template
    name: "Klapka kalibrace BOX1 / 0°"
    on_press:
      - lambda: |-
          id(klapka_servo).start_calibration();

  - platform: template
    name: "Klapka BOX1 svisle"
    on_press:
      - lambda: |-
          id(klapka_servo).move_to_angle(0.0f);

  - platform: template
    name: "Klapka BOX2 nastavený úhel"
    on_press:
      - lambda: |-
          id(klapka_servo).move_to_angle(id(klapka_uhel_box2).state);

  - platform: template
    name: "Klapka vlevo krok"
    on_press:
      - lambda: |-
          id(klapka_servo).rotate(false, (int) id(klapka_manual_speed).state);
      - delay: 500ms
      - lambda: |-
          id(klapka_servo).stop();

  - platform: template
    name: "Klapka vpravo krok"
    on_press:
      - lambda: |-
          id(klapka_servo).rotate(true, (int) id(klapka_manual_speed).state);
      - delay: 500ms
      - lambda: |-
          id(klapka_servo).stop();

  - platform: template
    name: "Klapka STOP"
    on_press:
      - lambda: |-
          id(klapka_servo).stop();

cover:
  - platform: template
    name: "Klapka"
    id: klapka_cover
    lambda: |-
      return id(klapka_percent).state / 100.0f;
    has_position: true
    optimistic: false
    assumed_state: false
    open_action:
      - lambda: |-
          id(klapka_servo).move_to_angle(id(klapka_uhel_box2).state);
    close_action:
      - lambda: |-
          id(klapka_servo).move_to_angle(0.0f);
    stop_action:
      - lambda: |-
          id(klapka_servo).stop();
    position_action:
      - lambda: |-
          id(klapka_servo).move_to_percent(pos * 100.0f);
